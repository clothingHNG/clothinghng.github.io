<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR - 프리미엄 패션</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {font-family:'Montserrat',sans-serif;margin:0;background:#fff;}
header{position:fixed;top:0;width:100%;background:#fff;border-bottom:1px solid #eee;}
.header-top{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;}
.logo{font-family:'Cormorant Garamond';font-size:28px;letter-spacing:8px;}
nav ul{display:flex;gap:30px;list-style:none;}
nav a{text-decoration:none;color:#000;font-size:12px;}
.products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:100px 40px;}
.product{border:1px solid #eee;padding:10px;text-align:center;}
.product img{width:100%;}
button{background:black;color:white;padding:10px;border:none;cursor:pointer;}
</style>
</head>

<body>

<header>
<div class="header-top">
<nav>
<ul>
<li><a href="#">여성</a></li>
<li><a href="#">남성</a></li>
<li><a href="#">키즈</a></li>
<li><a href="#">액세서리</a></li>
</ul>
</nav>

<div class="logo">NOIR</div>

<div>
<button>검색</button>
<button>로그인</button>
<button onclick="alert('장바구니')">장바구니</button>
</div>
</div>
</header>

<div class="products-grid" id="products"></div>

<script>
const products=[
{
name:"오버사이즈 블레이저",
price:2490000,
image:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=600"
},
{
name:"린넨 팬츠",
price:1290000,
image:"https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=600"
},
{
name:"셔츠",
price:890000,
image:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10?w=600"
},
{
name:"새틴 드레스",
price:1690000,
image:"https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=600"
}
];

function format(price){
return new Intl.NumberFormat('ko-KR').format(price)+"원";
}

function render(){
const el=document.getElementById("products");

el.innerHTML=products.map(p=>`
<div class="product">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${format(p.price)}</p>
<button onclick="buy('${p.name}')">구매하기</button>
</div>
`).join("");
}

function buy(name){
alert(name+" 구매 완료!");
}

render();
</script>

</body>
</html>
