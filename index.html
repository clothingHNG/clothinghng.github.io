<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Shop đa ngôn ngữ</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
    }

    select {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 18px;
      background: red;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Chọn ngôn ngữ -->
  <select id="language">
    <option value="vi">🇻🇳 Tiếng Việt</option>
    <option value="kr">🇰🇷 한국어</option>
    <option value="jp">🇯🇵 日本語</option>
    <option value="en">🇺🇸 English</option>
  </select>

  <h1 id="title"></h1>
  <p id="desc"></p>
  <button class="btn" id="buyBtn"></button>

  <script>
    const translations = {
      vi: {
        title: "Áo Hoodie Form Rộng",
        desc: "Hot trend Hàn Quốc 🔥",
        buy: "Mua ngay"
      },
      kr: {
        title: "오버핏 후드티",
        desc: "한국 인기 트렌드 🔥",
        buy: "지금 구매"
      },
      jp: {
        title: "オーバーフィットパーカー",
        desc: "韓国トレンド 🔥",
        buy: "今すぐ購入"
      },
      en: {
        title: "Oversized Hoodie",
        desc: "Korean trend 🔥",
        buy: "Buy Now"
      }
    };

    // Lấy ngôn ngữ đã chọn
    let lang = localStorage.getItem("lang") || "vi";

    const select = document.getElementById("language");
    select.value = lang;

    function changeLanguage(language) {
      document.getElementById("title").innerText = translations[language].title;
      document.getElementById("desc").innerText = translations[language].desc;
      document.getElementById("buyBtn").innerText = translations[language].buy;
    }

    changeLanguage(lang);

    // Khi đổi ngôn ngữ
    select.addEventListener("change", (e) => {
      const newLang = e.target.value;
      localStorage.setItem("lang", newLang);
      changeLanguage(newLang);
    });
  </script>

</body>
</html>
