<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR - Thời Trang Cao Cấp</title>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap)" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #ffffff;
            --gray-light: #f5f5f5;
            --gray: #767676;
            --gray-dark: #333333;
            --red: #cc0000;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: var(--black);
            background: var(--white);
            line-height: 1.6;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--white);
            border-bottom: 1px solid var(--gray-light);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: var(--black);
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.6;
        }

        .header-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .header-icons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cart-count {
            background: var(--black);
            color: var(--white);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 5px;
        }

        /* A/B Test Banner */
        .ab-test-banner {
            background: var(--black);
            color: var(--white);
            padding: 10px 40px;
            font-size: 11px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ab-test-banner select {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--white);
            padding: 5px 10px;
            font-size: 11px;
            cursor: pointer;
        }

        .ab-test-banner option {
            color: var(--black);
        }

        /* Hero */
        .hero {
            margin-top: 100px;
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                        url('[images.unsplash.com](https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1920)') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
        }

        .hero-content h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 64px;
            font-weight: 300;
            letter-spacing: 15px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
