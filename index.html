<script>
// ===== PRODUCT DATA =====
const products = [
{
id:1,
name:"오버사이즈 블레이저",
originalPrice:2490000,
discountPercent:30,
discountAmount:747000,
image:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=600",
isSale:true
},
{
id:2,
name:"린넨 팬츠",
originalPrice:1290000,
discountPercent:25,
discountAmount:322500,
image:"https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=600",
isSale:true
},
{
id:3,
name:"셔츠",
originalPrice:890000,
discountPercent:40,
discountAmount:356000,
image:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10?w=600",
isSale:true
}
];

// ===== A/B TEST =====
let variant = Math.random() > 0.5 ? "A" : "B";

// ===== FORMAT PRICE =====
function format(price){
return new Intl.NumberFormat('ko-KR').format(price)+"원";
}

// ===== CALCULATE PRICE =====
function getPrice(p){
if(!p.isSale) return p.originalPrice;

if(variant==="A"){
return p.originalPrice - (p.originalPrice * p.discountPercent/100);
}else{
return p.originalPrice - p.discountAmount;
}
}

// ===== DISCOUNT TEXT =====
function getDiscountText(p){
if(!p.isSale) return "";

if(variant==="A"){
return "-"+p.discountPercent+"%";
}else{
return "-"+format(p.discountAmount);
}
}

// ===== RENDER =====
function render(){
document.getElementById("products").innerHTML = products.map(p=>{
const price = getPrice(p);
const discount = getDiscountText(p);

return `
<div class="product">
<img src="${p.image}">
<h3>${p.name}</h3>

<p style="color:red;font-weight:bold">${format(price)}</p>
<p style="text-decoration:line-through;color:gray">${format(p.originalPrice)}</p>
<p style="color:#cc0000">${discount}</p>

<button onclick="buy('${p.name}')">구매하기</button>
</div>
`;
}).join("");
}

// ===== BUY =====
function buy(name){
alert(name+" 구매 완료!");
}

// ===== SWITCH MANUAL =====
function switchVariant(v){
variant = v;
render();
}

// ===== INIT =====
render();
</script>
