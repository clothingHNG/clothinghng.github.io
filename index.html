<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>상품 상세</title>

<style>
body{font-family:sans-serif;margin:0;padding:20px;}
.container{display:flex;gap:40px;}
img{width:400px;}
.price{color:red;font-size:20px;font-weight:bold;}
.old{color:gray;text-decoration:line-through;}
button{padding:10px;background:black;color:white;border:none;cursor:pointer;}
</style>
</head>

<body>

<div class="container">
<img id="image">
<div>
<h2 id="name"></h2>

<p class="price" id="price"></p>
<p class="old" id="old"></p>
<p id="discount"></p>

<select id="size">
<option>S</option>
<option>M</option>
<option>L</option>
</select>

<br><br>
<button onclick="addToCart()">장바구니 추가</button>
<button onclick="checkout()">바로 구매</button>

</div>
</div>

<script>

// ===== DATA (giống index) =====
const products=[
{
id:1,
name:"오버사이즈 블레이저",
originalPrice:2490000,
discountPercent:30,
discountAmount:747000,
image:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=600"
},
{
id:2,
name:"린넨 팬츠",
originalPrice:1290000,
discountPercent:25,
discountAmount:322500,
image:"https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=600"
}
];

// ===== GET PRODUCT =====
const id = localStorage.getItem("selectedProduct");
const p = products.find(x=>x.id==id);

// ===== A/B =====
let variant = localStorage.getItem("variant");

// ===== FORMAT =====
function format(x){
return new Intl.NumberFormat('ko-KR').format(x)+"원";
}

// ===== PRICE =====
function getPrice(){
if(variant==="A"){
return p.originalPrice - (p.originalPrice*p.discountPercent/100);
}else{
return p.originalPrice - p.discountAmount;
}
}

// ===== RENDER =====
document.getElementById("image").src = p.image;
document.getElementById("name").innerText = p.name;

const price = getPrice();

document.getElementById("price").innerText = format(price);
document.getElementById("old").innerText = format(p.originalPrice);

document.getElementById("discount").innerText =
variant==="A" ? "-"+p.discountPercent+"%" : "-"+format(p.discountAmount);

// ===== CART =====
function addToCart(){
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

cart.push({
name:p.name,
price:getPrice()
});

localStorage.setItem("cart", JSON.stringify(cart));

alert("장바구니 추가됨!");
}

// ===== CHECKOUT =====
function checkout(){
alert("결제 완료! (테스트)");
}

</script>

</body>
</html>
